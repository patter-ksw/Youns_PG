<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윤이네 놀이터 - Yun's PlayGround</title>
    <link rel="stylesheet" href="index.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-text">
                <h1 id="app-title">윤 이 네   놀 이 터</h1>
                <p id="app-subtitle">(Yun's PlayGround)</p>
            </div>
            <button id="btn-toggle-edit" class="btn">
                <span>⚙️</span> 편집 모드 켜기
            </button>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="서비스 검색..." autocomplete="off">
        </div>



        <!-- Main Categories and Services Area -->
        <main id="categories-container" class="categories-list">
            <!-- Dynamic Content Loaded from Supabase via app.js -->
            <div class="empty-state">데이터를 로드하는 중...</div>
        </main>

        <!-- Add Category Section (Only visible in edit mode) -->
        <div id="add-category-section" class="add-category-section" style="display: none;">
            <button id="btn-show-add-category" class="btn-add-category">
                + 새 카테고리 추가
            </button>
        </div>
    </div>

    <!-- Category Modal (Add / Edit) -->
    <div id="category-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="category-modal-title">카테고리 추가</h3>
                <button class="modal-close" onclick="closeModal('category-modal')">&times;</button>
            </div>
            <form id="category-form">
                <input type="hidden" id="category-id">
                <div class="form-group">
                    <label for="category-name">카테고리 이름</label>
                    <input type="text" id="category-name" class="form-control" placeholder="예: 공부방, 놀이방, 옷방" required>
                </div>
                <div class="form-group">
                    <label for="category-icon-input">아이콘 (이모지)</label>
                    <input type="text" id="category-icon-input" class="form-control" placeholder="예: 📚, 🎮, 👕" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('category-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Service Modal (Add / Edit) -->
    <div id="service-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="service-modal-title">서비스 추가</h3>
                <button class="modal-close" onclick="closeModal('service-modal')">&times;</button>
            </div>
            <form id="service-form">
                <input type="hidden" id="service-id">
                <input type="hidden" id="service-category-id">
                <div class="form-group">
                    <label for="service-title-input">서비스 이름</label>
                    <input type="text" id="service-title-input" class="form-control" placeholder="예: 번역기(단어장 만들기)" required>
                </div>
                <div class="form-group">
                    <label for="service-desc-input">설명</label>
                    <textarea id="service-desc-input" class="form-control" placeholder="서비스에 대한 간단한 설명을 입력하세요." required></textarea>
                </div>
                <div class="form-group">
                    <label for="service-url-input">연결 URL</label>
                    <input type="text" id="service-url-input" class="form-control" placeholder="예: http://... 또는 # (링크 없음)" required>
                </div>
                <div class="form-group">
                    <label for="service-badge-input">뱃지 텍스트</label>
                    <input type="text" id="service-badge-input" class="form-control" placeholder="예: Knowledge, Plugin, Game" required>
                </div>
                <div class="form-group">
                    <label for="service-icon-input">아이콘 (이모지)</label>
                    <input type="text" id="service-icon-input" class="form-control" placeholder="예: 📖, 🧩, 🧱" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('service-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
