<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youn's PlayGround</title>
    <link rel="icon" type="image/png" href="ypg_icon.png">
    <link rel="apple-touch-icon" href="ypg_icon.png">
    <link rel="stylesheet" href="index.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="auth-section" id="auth-section">
                <button id="btn-login-modal" class="btn btn-small">로그인/회원가입</button>
                <div id="user-info" class="user-info" style="display: none;">
                    <span id="user-nickname"></span>님
                    <button id="btn-logout" class="btn-text" style="margin-left: 8px;">로그아웃</button>
                </div>
            </div>

            <div class="header-text">
                <h1 id="app-title">Youn's PlayGround</h1>
            </div>

            <div class="header-actions">
                <button id="btn-board" class="btn btn-primary btn-small" style="margin-right: 15px;">📝 게시판</button>
                <button id="btn-toggle-edit" class="btn-toggle-edit" title="편집 모드">
                    <span>⚙️</span>
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="서비스 검색..." autocomplete="off">
        </div>



        <!-- Main Categories and Services Area -->
        <main id="categories-container" class="categories-list">
            <!-- Dynamic Content Loaded from Supabase via app.js -->
            <div class="empty-state">데이터를 로드하는 중...</div>
        </main>

        <!-- Add Category Section (Only visible in edit mode) -->
        <div id="add-category-section" class="add-category-section" style="display: none;">
            <button id="btn-show-add-category" class="btn-add-category">
                + 새 카테고리 추가
            </button>
        </div>
    </div>

    <!-- Category Modal (Add / Edit) -->
    <div id="category-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="category-modal-title">카테고리 추가</h3>
                <button class="modal-close" onclick="closeModal('category-modal')">&times;</button>
            </div>
            <form id="category-form">
                <input type="hidden" id="category-id">
                <div class="form-group">
                    <label for="category-name">카테고리 이름</label>
                    <input type="text" id="category-name" class="form-control" placeholder="예: 공부방, 놀이방, 옷방" required>
                </div>
                <div class="form-group">
                    <label>아이콘 (이모지 또는 이미지 파일)</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="category-icon-input" class="form-control" placeholder="예: 📚, 🎮, 👕" style="flex: 1;">
                        <input type="file" id="category-icon-file" accept="image/*" class="form-control" style="flex: 1; padding: 5px;">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('category-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Service Modal (Add / Edit) -->
    <div id="service-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="service-modal-title">서비스 추가</h3>
                <button class="modal-close" onclick="closeModal('service-modal')">&times;</button>
            </div>
            <form id="service-form">
                <input type="hidden" id="service-id">
                <input type="hidden" id="service-category-id">
                <div class="form-group">
                    <label for="service-title-input">서비스 이름</label>
                    <input type="text" id="service-title-input" class="form-control" placeholder="예: 번역기(단어장 만들기)" required>
                </div>
                <div class="form-group">
                    <label for="service-desc-input">설명</label>
                    <textarea id="service-desc-input" class="form-control" placeholder="서비스에 대한 간단한 설명을 입력하세요." required></textarea>
                </div>
                <div class="form-group">
                    <label for="service-url-input">연결 URL</label>
                    <input type="text" id="service-url-input" class="form-control" placeholder="예: http://... 또는 # (링크 없음)" required>
                </div>
                <div class="form-group">
                    <label for="service-badge-input">뱃지 텍스트</label>
                    <input type="text" id="service-badge-input" class="form-control" placeholder="예: Knowledge, Plugin, Game" required>
                </div>
                <div class="form-group">
                    <label>아이콘 (이모지 또는 이미지 파일)</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="service-icon-input" class="form-control" placeholder="예: 📖, 🧩, 🧱" style="flex: 1;">
                        <input type="file" id="service-icon-file" accept="image/*" class="form-control" style="flex: 1; padding: 5px;">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('service-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="auth-modal-title">로그인 / 회원가입</h3>
                <button class="modal-close" onclick="closeModal('auth-modal')">&times;</button>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
                <button class="auth-tab" onclick="switchAuthTab('signup')">회원가입</button>
            </div>
            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-username">아이디</label>
                    <input type="text" id="auth-username" class="form-control" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="auth-password">비밀번호</label>
                    <input type="password" id="auth-password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="form-group" id="auth-nickname-group" style="display: none;">
                    <label for="auth-nickname">닉네임</label>
                    <input type="text" id="auth-nickname" class="form-control" placeholder="사용할 닉네임을 입력하세요">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('auth-modal')">취소</button>
                    <button type="submit" class="btn btn-primary" id="btn-auth-submit">로그인</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Board Modal -->
    <div id="board-modal" class="modal-overlay">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title">📝 게시판</h3>
                <button class="modal-close" onclick="closeModal('board-modal')">&times;</button>
            </div>
            <div class="board-toolbar">
                <button id="btn-board-write" class="btn btn-primary">글쓰기</button>
            </div>
            <div class="board-list-container">
                <ul id="board-list" class="board-list">
                    <!-- Posts loaded here -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Board Write Modal -->
    <div id="board-write-modal" class="modal-overlay">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title" id="board-write-title">글쓰기</h3>
                <button class="modal-close" onclick="closeModal('board-write-modal')">&times;</button>
            </div>
            <form id="board-write-form">
                <input type="hidden" id="board-post-id">
                <div class="form-group">
                    <label for="board-title">제목</label>
                    <input type="text" id="board-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="board-content">내용</label>
                    <textarea id="board-content" class="form-control" style="min-height: 200px;" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('board-write-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Board Detail Modal -->
    <div id="board-detail-modal" class="modal-overlay">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title" id="detail-title">제목</h3>
                <button class="modal-close" onclick="closeModal('board-detail-modal')">&times;</button>
            </div>
            <div class="board-detail-meta">
                <span id="detail-nickname" class="badge"></span>
                <span id="detail-date" class="date-text"></span>
            </div>
            <div class="board-detail-content" id="detail-content"></div>
            
            <div class="board-detail-actions" id="detail-actions" style="display: none;">
                <button class="btn btn-small" id="btn-edit-post">수정</button>
                <button class="btn btn-small btn-danger" id="btn-delete-post">삭제</button>
            </div>

            <hr class="board-divider">

            <div class="board-replies-section">
                <h4>댓글</h4>
                <div id="replies-list" class="replies-list"></div>
                
                <form id="reply-form" class="reply-form">
                    <input type="hidden" id="reply-parent-id" value="">
                    <div class="reply-input-group">
                        <textarea id="reply-content" class="form-control" placeholder="댓글을 남겨보세요..." required></textarea>
                        <button type="submit" class="btn btn-primary">등록</button>
                    </div>
                    <div id="replying-to-indicator" style="display: none; font-size: 0.8rem; color: var(--accent-purple); margin-top: 5px;">
                        <span id="replying-to-name"></span>님에게 답글 작성 중 <button type="button" class="btn-text" onclick="cancelReplyTo()">취소</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
